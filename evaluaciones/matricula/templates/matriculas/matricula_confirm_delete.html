<!DOCTYPE html>

<html>

<head>

    <title>Borrar matricula</title>

</head>

<body>

<h1>Borrar matricula</h1>

<p>

    Vas a borrar:
    <strong>{{ matricula.alumno }}</strong>

</p>

<form method="post">

    {% csrf_token %}

    <button type="submit">
        Sí, borrar
    </button>

    <a href="{% url 'matriculas:detalle' matricula.pk %}">
        Cancelar
    </a>

</form>

</body>

</html>
